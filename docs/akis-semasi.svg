<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="-apple-system, Segoe UI, system-ui, sans-serif">
  <rect width="1280" height="720" fill="#efeee9"/>

  <!-- Header -->
  <text x="64" y="70" font-size="33" font-weight="700" fill="#22211e" letter-spacing="-0.5">Perde Web — yerel maskeleme + yapay zeka iş akışı</text>
  <text x="64" y="102" font-size="16.5" fill="#5a5850">Kişisel veriler tarayıcıdan çıkmadan AI'a hazırlanır; yanıt yine tarayıcıda çözülür.</text>
  <line x1="64" y1="122" x2="1216" y2="122" stroke="#dddcd7" stroke-width="1"/>

  <!-- ===== Device zone ===== -->
  <rect x="48" y="150" width="812" height="474" rx="18" fill="#ffffff" stroke="#dddcd7" stroke-width="1.5"/>
  <!-- lock icon -->
  <g transform="translate(72,181)" stroke="#3d7a4a" fill="none" stroke-width="1.6">
    <rect x="1.5" y="6" width="11" height="8" rx="1.6" fill="#3d7a4a" stroke="none"/>
    <path d="M4 6V4.1a3 3 0 0 1 6 0V6"/>
  </g>
  <text x="92" y="192" font-size="14" font-weight="600" fill="#3d7a4a" letter-spacing="0.6">CİHAZINIZ — TARAYICI</text>
  <text x="270" y="192" font-size="13" fill="#96948c">yerel · internet yok</text>

  <!-- Top flow chips -->
  <!-- chip 1 -->
  <rect x="72" y="214" width="224" height="96" rx="12" fill="#f7f6f3" stroke="#eae9e5"/>
  <circle cx="98" cy="242" r="13" fill="#1a1917"/><text x="98" y="247" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
  <text x="120" y="247" font-size="15.5" font-weight="700" fill="#22211e">Belge</text>
  <text x="94" y="276" font-size="13" fill="#5a5850">PDF · DOCX · UDF · metin</text>
  <text x="94" y="296" font-size="13" fill="#96948c">"…Ahmet Yılmaz, X A.Ş.…"</text>

  <!-- chip 2 -->
  <rect x="320" y="214" width="224" height="96" rx="12" fill="#f7f6f3" stroke="#eae9e5"/>
  <circle cx="346" cy="242" r="13" fill="#1a1917"/><text x="346" y="247" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
  <text x="368" y="247" font-size="15.5" font-weight="700" fill="#22211e">Yerel analiz</text>
  <text x="342" y="276" font-size="13" fill="#5a5850">100+ veri türü tespiti</text>
  <text x="342" y="296" font-size="13" fill="#96948c">kişi · kurum · TCKN · IBAN…</text>

  <!-- chip 3 -->
  <rect x="568" y="214" width="224" height="96" rx="12" fill="#f7f6f3" stroke="#eae9e5"/>
  <circle cx="594" cy="242" r="13" fill="#1a1917"/><text x="594" y="247" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
  <text x="616" y="247" font-size="15.5" font-weight="700" fill="#22211e">Tokenlı prompt</text>
  <text x="590" y="276" font-size="13" fill="#5a5850">geri döndürülebilir token</text>
  <text x="590" y="296" font-size="13" font-weight="600" fill="#4a6fa5">[KISI_1] · [KURUM_2]</text>

  <!-- top arrows -->
  <line x1="300" y1="262" x2="316" y2="262" stroke="#b6b4ac" stroke-width="2" marker-end="url(#a)"/>
  <line x1="548" y1="262" x2="564" y2="262" stroke="#b6b4ac" stroke-width="2" marker-end="url(#a)"/>

  <!-- Return flow chips -->
  <!-- chip 6 -->
  <rect x="72" y="466" width="224" height="104" rx="12" fill="#eef3ef" stroke="#bcd3c2"/>
  <circle cx="98" cy="494" r="13" fill="#3d7a4a"/><text x="98" y="499" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">6</text>
  <text x="120" y="499" font-size="15.5" font-weight="700" fill="#22211e">Yerel geri çözüm</text>
  <text x="94" y="528" font-size="13" fill="#5a5850">token → gerçek değer</text>
  <text x="94" y="549" font-size="13" font-weight="600" fill="#3d7a4a">[KISI_1] → Ahmet Yılmaz</text>

  <!-- chip 5 -->
  <rect x="320" y="466" width="224" height="104" rx="12" fill="#f7f6f3" stroke="#eae9e5"/>
  <circle cx="346" cy="494" r="13" fill="#1a1917"/><text x="346" y="499" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">5</text>
  <text x="368" y="499" font-size="15.5" font-weight="700" fill="#22211e">Yanıtı yapıştır</text>
  <text x="342" y="528" font-size="13" fill="#5a5850">AI cevabı tarayıcıya</text>
  <text x="342" y="549" font-size="13" fill="#96948c">[KISI_1] hâlâ tokenlı</text>

  <!-- harita note -->
  <rect x="568" y="466" width="224" height="104" rx="12" fill="#ffffff" stroke="#dddcd7" stroke-dasharray="4 3"/>
  <text x="590" y="497" font-size="13.5" font-weight="600" fill="#5a5850">Etiket haritası</text>
  <text x="590" y="520" font-size="12.5" fill="#96948c">yalnızca cihazınızda saklı</text>
  <text x="590" y="539" font-size="12.5" fill="#96948c">AI'a gitmez · silinebilir</text>

  <!-- return arrow chip5 -> chip6 -->
  <line x1="316" y1="518" x2="300" y2="518" stroke="#3d7a4a" stroke-width="2" marker-end="url(#g)"/>

  <!-- ===== External zone ===== -->
  <rect x="908" y="150" width="324" height="474" rx="18" fill="#ffffff" stroke="#dddcd7" stroke-width="1.5"/>
  <!-- globe icon -->
  <g transform="translate(930,181)" stroke="#a63d2f" fill="none" stroke-width="1.35">
    <circle cx="7" cy="7" r="6.6"/>
    <path d="M0.4 7h13.2M7 0.4v13.2"/>
    <ellipse cx="7" cy="7" rx="3" ry="6.6"/>
  </g>
  <text x="950" y="192" font-size="14" font-weight="600" fill="#a63d2f" letter-spacing="0.6">HARİCİ YAPAY ZEKA</text>

  <rect x="936" y="322" width="268" height="120" rx="12" fill="#f7f6f3" stroke="#eae9e5"/>
  <text x="1070" y="362" font-size="17" font-weight="700" fill="#22211e" text-anchor="middle">ChatGPT · Claude</text>
  <text x="1070" y="388" font-size="17" font-weight="700" fill="#22211e" text-anchor="middle">Gemini …</text>
  <text x="1070" y="416" font-size="12.5" fill="#96948c" text-anchor="middle">yalnızca maskeli metin gider</text>

  <!-- boundary -->
  <line x1="884" y1="158" x2="884" y2="616" stroke="#a63d2f" stroke-width="1.4" stroke-dasharray="6 5" opacity="0.4"/>

  <!-- cross-boundary arrows -->
  <path d="M796 262 H1070 V316" fill="none" stroke="#b6b4ac" stroke-width="2" marker-end="url(#a)"/>
  <text x="812" y="252" font-size="12.5" font-weight="600" fill="#5a5850">4 · siz kopyala-yapıştır</text>
  <path d="M1070 442 V518 H548" fill="none" stroke="#b6b4ac" stroke-width="2" marker-end="url(#a)"/>

  <!-- Footer -->
  <g transform="translate(64,646)">
    <path d="M9 1 L17.5 15.5 H0.5 Z" fill="none" stroke="#a63d2f" stroke-width="1.6" stroke-linejoin="round"/>
    <line x1="9" y1="6" x2="9" y2="10.5" stroke="#a63d2f" stroke-width="1.6"/>
    <circle cx="9" cy="12.8" r="0.95" fill="#a63d2f"/>
  </g>
  <text x="92" y="662" font-size="14.5" fill="#5a5850">KVKK uyumluluk garantisi <tspan font-weight="700" fill="#a63d2f">değildir</tspan>; tam anonimleştirme iddia etmez. Avukatın yerini almaz — çıktı kontrol edilmelidir.</text>
  <text x="64" y="690" font-size="13" fill="#96948c">Açık kaynak · tamamen tarayıcıda · ersancetin.github.io/perde-web</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#b6b4ac"/></marker>
    <marker id="g" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#3d7a4a"/></marker>
  </defs>
</svg>
